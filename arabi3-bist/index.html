/* ---------------- state ---------------- */
let ST = {reads:{}, done:{}, flag:{}, open:{}};
const KEY = 'arabi3_v1';
let filter = 'all', query = '';

const HAS_WS = !!(typeof window !== 'undefined' && window.storage
                  && typeof window.storage.set === 'function');
let MODE = 'memory';

async function save(){
  const raw = JSON.stringify(ST);
  if(HAS_WS){
    try{ await window.storage.set(KEY, raw); MODE='cloud'; flash(); syncURL(); return; }catch(e){}
  }
  try{ localStorage.setItem(KEY, raw); MODE='local'; flash(); syncURL(); return; }catch(e){}
  MODE='memory'; flash();
}

async function load(){
  if(HAS_WS){
    try{
      const r = await window.storage.get(KEY);
      if(r && r.value){ ST = Object.assign(ST, JSON.parse(r.value)); MODE='cloud'; return; }
      MODE='cloud';
    }catch(e){}
  }
  try{
    const v = localStorage.getItem(KEY);
    if(v) ST = Object.assign(ST, JSON.parse(v));
    localStorage.setItem('__t','1'); localStorage.removeItem('__t');
    MODE='local';
  }catch(e){ MODE='memory'; }
}

let flashT;
function flash(){
  const el = document.getElementById('saveInd'); if(!el) return;
  el.textContent = MODE==='memory' ? 'ذخیره نشد' : 'ذخیره شد ✓';
  el.style.color = MODE==='memory' ? 'var(--flag)' : 'var(--ok)';
  el.style.opacity = '1';
  clearTimeout(flashT);
  flashT = setTimeout(()=>{ el.style.opacity='0'; }, 1400);
}

/* ---------- همگام‌سازی از راه لینک ---------- */
/* همهٔ شناسه‌های کارت‌ها به ترتیب ثابت، تا بتوان وضعیت را بیتی فشرده کرد */
function idList(){
  const out=[];
  S.forEach(sec=>{ if(sec.kind==='cards') sec.items.forEach((_,i)=>out.push(sec.id+'-'+i)); });
  return out;
}
function bitsToB64(bits){
  const bytes=new Uint8Array(Math.ceil(bits.length/8));
  bits.forEach((b,i)=>{ if(b) bytes[i>>3] |= (1<<(i&7)); });
  let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64ToBits(str,n){
  try{
    const bin=atob(str.replace(/-/g,'+').replace(/_/g,'/'));
    const out=[];
    for(let i=0;i<n;i++){
      const byte=bin.charCodeAt(i>>3)||0;
      out.push(!!(byte & (1<<(i&7))));
    }
    return out;
  }catch(e){ return null; }
}
function encodeState(){
  const ids=idList();
  const d=bitsToB64(ids.map(id=>!!ST.done[id]));
  const f=bitsToB64(ids.map(id=>!!ST.flag[id]));
  const r=S.map(sec=>Math.min(99,ST.reads[sec.id]||0).toString(36).padStart(2,'0')).join('');
  return 'v1.'+ids.length.toString(36)+'.'+r+'.'+d+'.'+f;
}
function decodeState(code){
  try{
    const p=code.split('.');
    if(p[0]!=='v1') return false;
    const ids=idList(), n=parseInt(p[1],36);
    const dr=b64ToBits(p[3],Math.min(n,ids.length));
    const fr=b64ToBits(p[4],Math.min(n,ids.length));
    if(!dr||!fr) return false;
    ST.done={}; ST.flag={};
    dr.forEach((v,i)=>{ if(v && ids[i]) ST.done[ids[i]]=true; });
    fr.forEach((v,i)=>{ if(v && ids[i]) ST.flag[ids[i]]=true; });
    ST.reads={};
    const rs=p[2]||'';
    S.forEach((sec,i)=>{ const c=parseInt(rs.substr(i*2,2),36); if(c) ST.reads[sec.id]=c; });
    return true;
  }catch(e){ return false; }
}
/* آدرس نوار مرورگر همیشه به‌روز بماند، بدون شلوغ‌کردن تاریخچه */
function syncURL(){
  try{ history.replaceState(null,'', location.pathname+location.search+'#s='+encodeState()); }catch(e){}
}
function copyLink(){
  const url = location.origin+location.pathname+location.search+'#s='+encodeState();
  const done = ()=>alert('لینک پیشرفتت کپی شد.\n\nهر جا بازش کنی — هر مرورگر، هر دستگاه — تیک‌ها و نشان‌ها همان‌جا هستند.\n\nبرای خودت در تلگرام یا یادداشت‌ها بفرست.');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done).catch(()=>prompt('این لینک را کپی کن:',url));
  } else prompt('این لینک را کپی کن:', url);
}

/* پشتیبان‌گیری دستی */
function exportData(){
  const blob = new Blob([JSON.stringify(ST)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'arabi3-progress.json';
  a.click();
}
function importData(){
  const inp = document.createElement('input');
  inp.type='file'; inp.accept='.json';
  inp.onchange = ()=>{
    const f = inp.files[0]; if(!f) return;
    const rd = new FileReader();
    rd.onload = ()=>{ try{ ST = Object.assign({reads:{},done:{},flag:{},open:{}}, JSON.parse(rd.result));
      save(); render(); alert('پیشرفت بازگردانده شد.'); }catch(e){ alert('فایل معتبر نیست.'); } };
    rd.readAsText(f);
  };
  inp.click();
}

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
const fa = n => String(n).replace(/\d/g, d => '۰۱۲۳۴۵۶۷۸۹'[d]);
const cards = s => (s.kind === 'cards' ? s.items : []);
const allCards = () => S.reduce((a,s)=>a+cards(s).length,0);
const doneCount = () => Object.values(ST.done).filter(Boolean).length;
const flagCount = () => Object.values(ST.flag).filter(Boolean).length;

function matches(sec, i, it){
  const id = sec.id+'-'+i;
  if(filter==='todo' && ST.done[id]) return false;
  if(filter==='flag' && !ST.flag[id]) return false;
  if(filter==='done' && !ST.done[id]) return false;
  if(query){
    const hay = (it[0]+' '+it[1]+' '+(it[2]||'')).toLowerCase();
    if(!hay.includes(query)) return false;
  }
  return true;
}
function secVisible(sec){
  if(sec.kind==='cards'){
    return cards(sec).some((it,i)=>matches(sec,i,it));
  }
  if(filter!=='all') return false;
  if(query) return (sec.t+' '+(sec.body||'')).toLowerCase().includes(query);
  return true;
}

/* ---------------- render ---------------- */
function render(){
  const wrap = $('#wrap'); wrap.innerHTML='';
  let anyShown = false;

  S.forEach(sec=>{
    if(!secVisible(sec)) return;
    anyShown = true;
    const list = cards(sec);
    const shown = list.map((it,i)=>({it,i})).filter(o=>matches(sec,o.i,o.it));
    const d = list.filter((_,i)=>ST.done[sec.id+'-'+i]).length;
    const pct = list.length ? Math.round(d/list.length*100) : (ST.reads[sec.id]?100:0);
    const isOpen = ST.open[sec.id] || (!!query);

    const el = document.createElement('div');
    el.className = 'sec'+(isOpen?' open':'');
    el.id = 'sec-'+sec.id;

    let meta = list.length
      ? fa(d)+' از '+fa(list.length)+' بلدم'
      : 'قاعده و نکته';
    if(ST.reads[sec.id]) meta += ' • '+fa(ST.reads[sec.id])+' بار خواندم';

    let h = '<div class="sechd" data-sec="'+sec.id+'">'
      + '<div class="ic">'+(sec.ic||'▪')+'</div>'
      + '<div class="tt"><h2>'+sec.t+'</h2><div class="meta">'+meta+'</div></div>'
      + '<div class="chev">◀</div></div>'
      + '<div class="pbar"><i style="width:'+pct+'%"></i></div>'
      + '<div class="secbody">';

    if(sec.hint) h += '<div class="tip" style="margin-top:10px">'+sec.hint+'</div>';

    h += '<div class="tools">'
      + '<div class="reads"><button data-rm="'+sec.id+'">−</button><b>'+fa(ST.reads[sec.id]||0)+'</b>'
      + '<button data-rp="'+sec.id+'">+</button><span>بار خواندم</span></div>';
    if(list.length){
      h += '<button class="tbtn" data-rev="'+sec.id+'">👁 نمایش همهٔ ترجمه‌ها</button>'
        +  '<button class="tbtn" data-hid="'+sec.id+'">🙈 پنهان کردن</button>'
        +  '<button class="tbtn" data-alld="'+sec.id+'">✓ همه را بلدم</button>'
        +  '<button class="tbtn" data-clr="'+sec.id+'">↺ صفر کردن</button>';
    }
    h += '</div>';

    if(sec.kind==='cards'){
      shown.forEach(o=>{
        const id = sec.id+'-'+o.i;
        const cls = 'card'+(ST.done[id]?' done':'')+(ST.flag[id]?' flag':'');
        h += '<div class="'+cls+'" id="c-'+id+'">'
          + '<div class="acts">'
          +   '<button class="'+(ST.done[id]?'on-ok':'')+'" data-ok="'+id+'" title="بلدم">✓</button>'
          +   '<button class="'+(ST.flag[id]?'on-fl':'')+'" data-fl="'+id+'" title="نشان برای مرور">★</button>'
          + '</div>'
          + '<div class="side-a"><span class="ar">'+o.it[0]+'</span><span class="idx">'+fa(o.i+1)+'</span></div>'
          + '<div class="fa hide" data-rv="'+id+'">'+o.it[1]+'</div>'
          + (o.it[2] ? '<div class="nt">'+o.it[2]+'</div>' : '')
          + '</div>';
      });
      if(!shown.length) h += '<div class="empty">چیزی با این فیلتر نیست.</div>';
    } else {
      h += '<div class="blk">'+sec.body+'</div>';
    }

    h += '</div>';
    el.innerHTML = h;
    wrap.appendChild(el);
  });

  if(!anyShown) wrap.innerHTML = '<div class="empty">نتیجه‌ای پیدا نشد. فیلتر یا جست‌وجو را عوض کن.</div>';

  renderNav(); renderTop();
}

function renderNav(){
  const nav = $('#nav'); nav.innerHTML='';
  S.forEach(sec=>{
    const list = cards(sec);
    const d = list.filter((_,i)=>ST.done[sec.id+'-'+i]).length;
    const pct = list.length ? Math.round(d/list.length*100) : (ST.reads[sec.id]?100:0);
    const b = document.createElement('button');
    b.className='nchip';
    b.innerHTML = '<i>'+(sec.ic||'▪')+'</i>'+sec.t.split('—')[0].trim()
      + '<span class="bar" style="width:'+pct+'%"></span>';
    b.onclick=()=>{
      ST.open[sec.id]=true; save(); render();
      setTimeout(()=>{ const t=document.getElementById('sec-'+sec.id);
        if(t) t.scrollIntoView({behavior:'smooth',block:'start'}); },60);
    };
    nav.appendChild(b);
  });
}

function renderTop(){
  const tot = allCards(), d = doneCount();
  const pct = tot ? Math.round(d/tot*100) : 0;
  const c = 2*Math.PI*24;
  $('#rc').setAttribute('stroke-dashoffset', c - c*pct/100);
  $('#rp').textContent = fa(pct)+'٪';
  const reads = Object.values(ST.reads).reduce((a,b)=>a+b,0);
  $('#stat').innerHTML = '<b>'+fa(d)+'</b> از '+fa(tot)+' مورد بلدی • <u>★ '+fa(flagCount())
    +'</u> نشان‌دار • '+fa(reads)+' بار مرور';
  const left = tot-d;
  $('#subline').textContent = left ? fa(left)+' مورد تا پایان مانده' : 'همه را بلدی. برو بیستت را بگیر.';
}

/* ---------------- events ---------------- */
document.addEventListener('click', e=>{
  const t = e.target.closest('button, .sechd, .fa[data-rv]');
  if(!t) return;

  if(t.classList.contains('sechd')){
    const id = t.dataset.sec; ST.open[id] = !ST.open[id]; save(); render(); return;
  }
  if(t.dataset.rv !== undefined && t.classList.contains('fa')){
    t.classList.toggle('hide'); return;
  }
  const d = t.dataset;
  if(d.ok){ ST.done[d.ok] = !ST.done[d.ok]; if(ST.done[d.ok]) ST.flag[d.ok]=false; save(); render(); return; }
  if(d.fl){ ST.flag[d.fl] = !ST.flag[d.fl]; save(); render(); return; }
  if(d.rp){ ST.reads[d.rp] = (ST.reads[d.rp]||0)+1; save(); render(); return; }
  if(d.rm){ ST.reads[d.rm] = Math.max(0,(ST.reads[d.rm]||0)-1); save(); render(); return; }
  if(d.rev){ document.querySelectorAll('#sec-'+d.rev+' .fa').forEach(x=>x.classList.remove('hide')); return; }
  if(d.hid){ document.querySelectorAll('#sec-'+d.hid+' .fa').forEach(x=>x.classList.add('hide')); return; }
  if(d.alld){ const s=S.find(x=>x.id===d.alld); cards(s).forEach((_,i)=>ST.done[s.id+'-'+i]=true); save(); render(); return; }
  if(d.clr){ const s=S.find(x=>x.id===d.clr);
    cards(s).forEach((_,i)=>{ ST.done[s.id+'-'+i]=false; ST.flag[s.id+'-'+i]=false; });
    ST.reads[s.id]=0; save(); render(); return; }
});

document.querySelectorAll('.fbtn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); filter=b.dataset.f;
    if(filter!=='all') S.forEach(s=>ST.open[s.id]=true);
    render();
  };
});

let qt;
$('#q').addEventListener('input', e=>{
  clearTimeout(qt);
  qt = setTimeout(()=>{ query = e.target.value.trim().toLowerCase(); render(); }, 200);
});

$('#expand').onclick = ()=>{
  const anyClosed = S.some(s=>!ST.open[s.id]);
  S.forEach(s=>ST.open[s.id]=anyClosed);
  $('#expand').textContent = anyClosed ? 'بستن همه' : 'باز کردن همه';
  save(); render();
};

$('#lnk').onclick = copyLink;
$('#lnk').title = 'کپی لینکی که پیشرفتت داخلش است';
$('#exp').onclick = exportData;
$('#exp').title = 'گرفتن فایل پشتیبان از پیشرفت';
$('#imp').onclick = importData;
$('#imp').title = 'بازگرداندن پیشرفت از فایل پشتیبان';

$('#reset').onclick = ()=>{
  if(!confirm('همهٔ تیک‌ها، نشان‌ها و شمارنده‌ها پاک شود؟')) return;
  ST = {reads:{},done:{},flag:{},open:{}}; save(); render();
};

/* ---------------- boot ---------------- */
(async ()=>{
  await load();
  const h = location.hash.match(/#s=(.+)$/);
  if(h){
    if(decodeState(decodeURIComponent(h[1]))){
      await save();
      setTimeout(()=>{
        const el=document.getElementById('saveInd');
        if(el){ el.textContent='پیشرفت از لینک بازیابی شد ✓'; el.style.color='var(--ok)'; el.style.opacity='1';
                setTimeout(()=>el.style.opacity='0',2600); }
      },400);
    }
  }
  if(!Object.keys(ST.open).length) ST.open['plan']=true;
  render(); syncURL();
})();
</script>
